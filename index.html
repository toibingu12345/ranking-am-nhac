<!DOCTYPE html>
<html lang="vi">

<head>
  <link rel="shortcut icon" href="src/assets/yinyang.ico" type="image/x-icon">
  <link rel="icon" href="src/assets/yinyang.ico" type="image/x-icon">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="og:site_name" content="Xếp hạng bài hát của Ngọt / Thắng">
  <meta name="og:description" content="Xếp hạng bài hát của Ngọt / Thắng">
  <meta name="og:image" content="https://i.imgur.com/IZzJMk6.jpg">
  <title>Xếp hạng bài hát của Ngọt / Thắng</title>

  <link rel="stylesheet" type="text/css" href="src/css/reset.css">
  <link rel="stylesheet" type="text/css" href="src/css/styles.css">

  <script src="src/js/data.js"></script>
  <script src="src/js/data/2026-07-23.js"></script>

  <script src="src/js/html2canvas.min.js"></script>
  <script src="src/js/lz-string.min.js"></script>
  <script src="src/js/seedrandom.min.js"></script>
  <script src="src/js/main.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif !important;
      background-color: #11265b !important;
      color: #ffffff !important;
      font-size: 17px !important;       
      line-height: 1.7 !important;      
      letter-spacing: 0.3px;           
    }

    p, li, span, div {
      color: #ffffff !important;
      line-height: 1.6 !important;
    }

    h1, h2, h3, h4 {
      color: #ffffff !important;
      line-height: 1.4 !important;
      margin-top: 25px;
      margin-bottom: 15px;
      letter-spacing: 1px;             
    }

    a {
      color: #82b1ff !important;
    }
  </style>
</head>

<body>
  <div class="site-wrapper">
    <div class="container">
      <!-- 1. Progress Bar được đưa hẳn lên trên đầu -->
      <div class="progress-wrapper">
        <div class="progress">
          <span class="progressbattle"></span>
          <div class="progressbar">
            <div class="progressfill"></div>
            <span class="progresstext">0%</span>
          </div>
        </div>
      </div>

      <!-- 2. Khung thi đấu chính -->
      <div class="sorter">
        <img src="src/assets/defaultL.jpg" class="left sort image" alt="Left Option">

        <!-- Các trạng thái nút bấm -->
        <div class="starting start button">Nhấn để bắt đầu</div>
        <div class="starting load button">Load <span></span></div>
        <div class="loading button"><div></div><span>Loading...</span></div>

        <div class="sorting tie button">Bằng nhau</div>
        <div class="sorting undo button">Quay lại</div>

        <div class="finished-container">
          <button class="btn-action finished getimg">Lưu ảnh</button>
          <button class="btn-action finished list">Lưu văn bản</button>
          <button class="btn-action finished retry">Thử lại</button>
        </div>

        <img src="src/assets/defaultR.jpg" class="right sort image" alt="Right Option">

        <div class="left sort text"><p></p></div>
        <div class="right sort text"><p></p></div>
      </div>

      <div class="time taken"></div>
      
      <!-- Bảng kết quả -->
      <div class="results" id="results-container"></div>
    </div>

    <!-- 3. Chân trang cố định luôn ở tít cuối cùng -->
    <footer class="info">
      <a href="https://github.com/execfera/charasort/" target="_blank" rel="noopener noreferrer">Source</a> | 
      <a href="https://open.spotify.com/artist/0V2DfUrZvBuUReS1LFo5ZI" target="_blank" rel="noopener noreferrer">Ngọt (Spotify)</a> | 
      <a href="https://open.spotify.com/artist/1oD9fKbb7qQ2nhn9JJC24F" target="_blank" rel="noopener noreferrer">Thắng (Spotify)</a>

      <p class="info-detail">Cập nhật gần nhất: 23/07/2026</p>
      <p class="info-detail">Phần mềm sử dụng: Github, Gemini (hỗ trợ tạo và sửa code)</p>
      <p class="info-detail">Phím tắt máy tính: H (chọn bên TRÁI), J (QUAY LẠI), K (BẰNG NHAU), L (chọn bên PHẢI)</p>
    </footer>
  </div>
</body>

</html>
